<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loading…</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,16..72,300;0,16..72,400;0,16..72,500;1,16..72,300;1,16..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  :root {
    --bg: #FAFAF8; --bg-2: #F3F3EF;
    --ink: #15151A; --ink-2: #46463F; --ink-3: #6B6B66; --ink-4: #9A9A93;
    --faint: #B5B5AD; --line: #E7E7E1; --line-2: #E0E0D9;
    --chip-border: #C9C9C0;
    --solid: #15151A; --solid-text: #FAFAF8; --solid-hover: #2A2A30;
    --nav-bg: rgba(250,250,248,0.82); --panel-bg: #F3F3EF;
    --transition: background-color .35s ease, color .35s ease, border-color .35s ease;
  }
  [data-theme="dark"] {
    --bg: #121210; --bg-2: #1A1A17;
    --ink: #F2F2EC; --ink-2: #BDBDB4; --ink-3: #9E9E95; --ink-4: #76766D;
    --faint: #5A5A52; --line: #2A2A26; --line-2: #27271F;
    --chip-border: #3A3A34;
    --solid: #F2F2EC; --solid-text: #121210; --solid-hover: #D8D8CE;
    --nav-bg: rgba(18,18,16,0.82); --panel-bg: #1A1A17;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Archivo', sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: var(--transition);
  }
  ::selection { background: var(--ink); color: var(--bg); }

  /* ── Nav ── */
  nav {
    position: sticky; top: 0; z-index: 50;
    background: var(--nav-bg);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px clamp(20px,5vw,80px);
  }
  .nav-brand {
    font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
    color: var(--ink); text-decoration: none; white-space: nowrap;
    transition: opacity 0.2s; opacity: 1;
  }
  .nav-brand:hover { opacity: 0.5; }
  .nav-back {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ink-3); text-decoration: none;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--ink); }
  .theme-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; font-size: 15px;
    color: var(--ink); background: transparent;
    border: 1px solid var(--line); border-radius: 2px; cursor: pointer;
    transition: border-color 0.2s, transform 0.35s;
  }
  .theme-btn:hover { border-color: var(--ink); transform: rotate(18deg); }

  /* ── Article ── */
  article {
    max-width: 720px;
    margin: 0 auto;
    padding: clamp(56px,8vw,104px) clamp(20px,5vw,80px) clamp(80px,10vw,140px);
  }

  .post-eyebrow {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: clamp(28px,4vw,48px);
  }
  .post-chip {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink); border: 1px solid var(--chip-border);
    border-radius: 999px; padding: 3px 10px;
  }
  .post-meta-line {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.06em; color: var(--ink-4);
  }

  .post-title {
    margin: 0 0 clamp(16px,2vw,28px);
    font-weight: 500;
    font-size: clamp(36px,5.5vw,72px);
    line-height: 0.95;
    letter-spacing: -0.035em;
    color: var(--ink);
  }

  .post-blurb {
    margin: 0 0 clamp(36px,5vw,64px);
    font-family: 'Newsreader', serif; font-style: italic;
    font-size: clamp(20px,2vw,26px); line-height: 1.4;
    color: var(--ink-2);
    border-bottom: 1px solid var(--line);
    padding-bottom: clamp(36px,5vw,64px);
  }

  /* ── Post body typography ── */
  .post-body { font-family: 'Newsreader', serif; color: var(--ink-2); }
  .post-body p { font-size: clamp(17px,1.5vw,20px); line-height: 1.7; margin: 0 0 1.4em; }
  .post-body h2 {
    font-family: 'Archivo', sans-serif; font-weight: 500;
    font-size: clamp(22px,2.4vw,30px); letter-spacing: -0.02em;
    color: var(--ink); margin: 2em 0 0.6em;
  }
  .post-body h3 {
    font-family: 'Archivo', sans-serif; font-weight: 500;
    font-size: clamp(18px,1.8vw,22px); color: var(--ink); margin: 1.6em 0 0.5em;
  }
  .post-body ul, .post-body ol {
    padding-left: 1.4em; margin: 0 0 1.4em;
  }
  .post-body li { font-size: clamp(17px,1.5vw,20px); line-height: 1.65; margin-bottom: 0.5em; }
  .post-body blockquote {
    border-left: 2px solid var(--ink); margin: 2em 0; padding: 0 0 0 1.5em;
    font-style: italic; color: var(--ink-3);
  }
  .post-body code {
    font-family: 'JetBrains Mono', monospace; font-size: 0.88em;
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 3px; padding: 1px 5px; color: var(--ink);
  }
  .post-body pre {
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 4px; padding: 20px 24px; overflow-x: auto;
    margin: 0 0 1.4em;
  }
  .post-body pre code { background: none; border: none; padding: 0; font-size: 14px; }
  .post-body hr { border: none; border-top: 1px solid var(--line); margin: 2.5em 0; }
  .post-body a { color: var(--ink); text-decoration: underline; text-underline-offset: 3px; }
  .post-body a:hover { opacity: 0.6; }

  /* ── Not found state ── */
  .not-found {
    text-align: center; padding: 120px 20px;
  }
  .not-found h2 { font-size: 28px; font-weight: 500; color: var(--ink); }
  .not-found p { color: var(--ink-3); font-family: 'Newsreader', serif; font-size: 18px; }

  /* ── Footer ── */
  .post-footer {
    border-top: 1px solid var(--line);
    max-width: 720px; margin: 0 auto;
    padding: 32px clamp(20px,5vw,80px) 64px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
  }
  .back-link {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ink-3); text-decoration: none; transition: color 0.2s;
  }
  .back-link:hover { color: var(--ink); }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="../index.html" class="nav-brand">Vinay V P</a>
    <div style="display:flex;align-items:center;gap:14px;">
      <a href="../index.html#blog" class="nav-back">← All posts</a>
      <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">☾</button>
    </div>
  </div>
</nav>

<div id="content">
  <article id="post-article" style="display:none;">
    <div class="post-eyebrow">
      <span class="post-chip" id="post-tag"></span>
      <span class="post-meta-line" id="post-meta"></span>
    </div>
    <h1 class="post-title" id="post-title"></h1>
    <p class="post-blurb" id="post-blurb"></p>
    <div class="post-body" id="post-body"></div>
  </article>

  <div class="not-found" id="not-found" style="display:none;">
    <h2>Post not found</h2>
    <p>This post doesn't exist or has been unpublished.</p>
  </div>
</div>

<div class="post-footer">
  <a href="../index.html#blog" class="back-link">← Back to writing</a>
  <span style="font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-4);">© 2026 Vinay V P</span>
</div>

<script>
  // ── Theme ──
  const themeBtn = document.getElementById('themeBtn');
  let theme = localStorage.getItem('va-theme') || 'light';
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'dark' ? '☀' : '☾';
    theme = t;
  }
  applyTheme(theme);
  themeBtn.addEventListener('click', () => {
    const next = theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('va-theme', next);
    applyTheme(next);
  });

  // ── Load post ──
  const slug = new URLSearchParams(window.location.search).get('slug');

  fetch('posts.json')
    .then(r => r.json())
    .then(posts => {
      const post = posts.find(p => p.slug === slug && p.published !== false);
      if (!post) {
        document.getElementById('not-found').style.display = 'block';
        document.title = 'Post not found — Vinay V P';
        return;
      }
      document.title = post.title + ' — Vinay V P';
      document.getElementById('post-tag').textContent    = post.tag;
      document.getElementById('post-meta').textContent   = post.date + ' · ' + post.readTime;
      document.getElementById('post-title').textContent  = post.title;
      document.getElementById('post-blurb').textContent  = post.blurb;
      document.getElementById('post-body').innerHTML     = post.content || '<p>Content coming soon.</p>';
      document.getElementById('post-article').style.display = 'block';
    })
    .catch(() => {
      document.getElementById('not-found').style.display = 'block';
      document.title = 'Post not found — Vinay V P';
    });
</script>
</body>
</html>
